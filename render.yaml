services:
  - type: web
    runtime: docker
    name: alitube-ai
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: ENABLE_YOUTUBE_AUDIO_FALLBACK
        value: "true"
      - key: YOUTUBE_TRANSCRIPTION_MODE
        value: whisper
      - key: PRIVATE_OBJECT_DIR
        sync: false
      - key: PUBLIC_OBJECT_SEARCH_PATHS
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
