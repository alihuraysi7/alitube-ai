<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>غير متصل — Ali YouTube</title>
    <meta name="theme-color" content="#0B1220" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: #0B1220;
        color: #fff;
        font-family: 'Cairo', 'Tajawal', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
        overflow: hidden;
      }

      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(60px);
        pointer-events: none;
      }
      .orb-1 {
        width: 50vw; height: 50vw;
        top: -15vw; left: -15vw;
        background: radial-gradient(ellipse, rgba(124,58,237,0.18) 0%, transparent 70%);
      }
      .orb-2 {
        width: 45vw; height: 45vw;
        bottom: -10vw; right: -10vw;
        background: radial-gradient(ellipse, rgba(0,212,255,0.12) 0%, transparent 70%);
      }

      .card {
        position: relative;
        z-index: 1;
        background: rgba(20, 27, 45, 0.8);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        padding: 48px 36px;
        max-width: 440px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .icon-wrap {
        width: 80px; height: 80px;
        border-radius: 22px;
        background: linear-gradient(135deg, rgba(255,61,0,0.15), rgba(124,58,237,0.15));
        border: 1px solid rgba(255,61,0,0.25);
        display: flex; align-items: center; justify-content: center;
        font-size: 36px;
      }

      h1 {
        font-size: 1.6rem;
        font-weight: 800;
        background: linear-gradient(135deg, #FF3D00, #E91E8C, #7C3AED);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        color: #94A3B8;
        font-size: 0.95rem;
        line-height: 1.7;
        max-width: 320px;
      }

      .btn {
        margin-top: 8px;
        padding: 12px 32px;
        border-radius: 14px;
        background: linear-gradient(135deg, #FF3D00, #C62AA0, #7C3AED);
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        font-family: inherit;
        border: none;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: opacity 0.2s, transform 0.15s;
      }
      .btn:hover { opacity: 0.88; transform: translateY(-2px); }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
      <div class="icon-wrap">📡</div>
      <h1>غير متصل بالإنترنت</h1>
      <p>
        يبدو أنك غير متصل بالإنترنت حالياً.
        تحقق من اتصالك ثم حاول مجدداً.
      </p>
      <a href="/" class="btn">↩ العودة للتطبيق</a>
    </div>
  </body>
</html>
