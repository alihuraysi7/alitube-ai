<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141B2D"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="btn512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3D00"/>
      <stop offset="50%" stop-color="#C62AA0"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow512" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF3D00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF3D00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background — full square for maskable safe zone -->
  <rect width="512" height="512" fill="url(#bg512)"/>
  <!-- Ambient glow -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="url(#glow512)"/>
  <!-- YouTube-style rounded button — centered with safe-zone padding -->
  <rect x="80" y="168" width="352" height="176" rx="40" fill="url(#btn512)"/>
  <!-- Play triangle -->
  <path d="M214 220 L214 292 L330 256 Z" fill="white" opacity="0.95"/>
</svg>
